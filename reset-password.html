<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password | RouteRoush</title>
  <link rel="icon" type="image/png" href="routeroush-logo.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
      padding:24px;color:#eef6ff;font-family:Inter,Arial,sans-serif;
      background:
        radial-gradient(circle at 12% 8%,rgba(34,199,242,.13),transparent 28%),
        radial-gradient(circle at 88% 14%,rgba(147,51,234,.15),transparent 28%),
        linear-gradient(180deg,#06101d,#091527);
    }
    .card{
      width:min(500px,100%);padding:28px;border-radius:22px;
      border:1px solid #29415e;background:linear-gradient(145deg,#0f1e33,#0a1728);
      box-shadow:0 28px 90px rgba(0,0,0,.42);
    }
    .logo{
      display:block;width:280px;max-width:100%;height:auto;margin:0 auto 22px;
      padding:8px;border-radius:14px;background:white;
    }
    h1{margin:0 0 8px;font-size:30px;letter-spacing:-.03em}
    p{margin:0 0 22px;color:#9db0c8;line-height:1.55}
    label{display:block;margin:14px 0 6px;font-size:12px;font-weight:700;color:#bfd0e4}
    input{
      width:100%;padding:13px 14px;border-radius:11px;border:1px solid #2b4666;
      background:#071525;color:white;font-size:15px;outline:none;
    }
    input:focus{border-color:#22c7f2;box-shadow:0 0 0 3px rgba(34,199,242,.11)}
    button{
      width:100%;margin-top:18px;padding:13px 16px;border:0;border-radius:11px;
      color:white;font-size:15px;font-weight:800;cursor:pointer;
      background:linear-gradient(135deg,#10b981,#0ea5e9 55%,#4f46e5);
    }
    button:disabled{opacity:.65;cursor:not-allowed}
    .message{display:none;margin-top:14px;padding:12px;border-radius:10px;line-height:1.45}
    .success{display:block;background:#0e2b24;color:#86efac;border:1px solid #1d5545}
    .error{display:block;background:#351825;color:#fda4af;border:1px solid #653044}
    .loading{text-align:center;color:#9db0c8}
    .back{display:block;margin-top:17px;text-align:center;color:#7dd3fc;text-decoration:none}
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="routeroush-logo.png" alt="RouteRoush logo">
    <div id="loadingState" class="loading">Verifying your password-reset link…</div>

    <section id="resetForm" style="display:none">
      <h1>Create a new password</h1>
      <p>Choose a secure new password for your RouteRoush account.</p>

      <label for="newPassword">New password</label>
      <input id="newPassword" type="password" autocomplete="new-password" placeholder="At least 8 characters">

      <label for="confirmPassword">Confirm new password</label>
      <input id="confirmPassword" type="password" autocomplete="new-password" placeholder="Repeat your new password">

      <button id="updatePasswordBtn">Update password</button>
      <div id="message" class="message"></div>
    </section>

    <section id="invalidState" style="display:none">
      <h1>Reset link unavailable</h1>
      <p>This reset link is invalid or has expired. Request a new password-reset email from the RouteRoush login page.</p>
      <a class="back" href="/">Return to RouteRoush</a>
    </section>
  </main>

  <script>
    const SUPABASE_URL = 'https://tirwsczlvkuwhwkpdpik.supabase.co';
    const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_D7bR7EpnFWpM0EsLc0mnqQ_0zcF9jdS';
    const supabaseClient = supabase.createClient(
      SUPABASE_URL,
      SUPABASE_PUBLISHABLE_KEY
    );

    const loadingState = document.getElementById('loadingState');
    const resetForm = document.getElementById('resetForm');
    const invalidState = document.getElementById('invalidState');
    const newPassword = document.getElementById('newPassword');
    const confirmPassword = document.getElementById('confirmPassword');
    const updatePasswordBtn = document.getElementById('updatePasswordBtn');
    const message = document.getElementById('message');

    let recoveryReady = false;

    function showMessage(text, isError=false) {
      message.textContent = text;
      message.className = `message ${isError ? 'error' : 'success'}`;
    }

    function showResetForm() {
      recoveryReady = true;
      loadingState.style.display = 'none';
      invalidState.style.display = 'none';
      resetForm.style.display = 'block';
    }

    function showInvalid() {
      recoveryReady = false;
      loadingState.style.display = 'none';
      resetForm.style.display = 'none';
      invalidState.style.display = 'block';
    }

    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY' || session?.user) {
        showResetForm();
      }
    });

    async function initializeRecovery() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');

      try {
        if (code) {
          const { error } = await supabaseClient.auth.exchangeCodeForSession(code);
          if (error) throw error;
          showResetForm();
          return;
        }

        // Supports Supabase implicit/hash-based recovery links too.
        const { data, error } = await supabaseClient.auth.getSession();
        if (error) throw error;

        if (data.session?.user) {
          showResetForm();
          return;
        }

        // Give onAuthStateChange a short chance to process hash tokens.
        window.setTimeout(() => {
          if (!recoveryReady) showInvalid();
        }, 1200);
      } catch (error) {
        console.error(error);
        showInvalid();
      }
    }

    updatePasswordBtn.onclick = async () => {
      const password = newPassword.value;
      const confirmation = confirmPassword.value;

      if (password.length < 8) {
        showMessage('Password must be at least 8 characters.', true);
        return;
      }

      if (password !== confirmation) {
        showMessage('The two passwords do not match.', true);
        return;
      }

      updatePasswordBtn.disabled = true;
      updatePasswordBtn.textContent = 'Updating password…';

      try {
        const { error } = await supabaseClient.auth.updateUser({ password });
        if (error) throw error;

        showMessage('Password updated successfully. Redirecting to RouteRoush…');
        window.setTimeout(() => {
          window.location.replace('https://routeroush.com/');
        }, 1400);
      } catch (error) {
        showMessage(error?.message || 'Could not update the password.', true);
      } finally {
        updatePasswordBtn.disabled = false;
        updatePasswordBtn.textContent = 'Update password';
      }
    };

    initializeRecovery();
  </script>
</body>
</html>
